<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VNPT Exam Bank v1</title><link rel="stylesheet" href="css/style.css"></head><body><header><h1>VNPT Exam Bank v1</h1><p>Luyện thi online vị trí Kỹ sư lập trình Java - VNPT Hà Nội</p></header><main><section id="home" class="card"><h2>Chế độ luyện thi</h2><div class="grid"><button onclick="startRandomExam()">Random 50 câu / 60 phút</button><button onclick="showMockList()">Mock Test</button><button onclick="showBankStats()">Thống kê ngân hàng câu hỏi</button></div><div id="mockList"></div><div id="stats"></div><h3>Lịch sử làm bài</h3><div id="history"></div></section><section id="quiz" class="card hidden"><div class="quiz-head"><div><h2 id="quizTitle"></h2><p id="progress"></p></div><div id="timer"></div></div><div id="questionBox"></div><div class="actions"><button onclick="prevQuestion()">Câu trước</button><button onclick="nextQuestion()">Câu sau</button><button onclick="submitExam()">Nộp bài</button></div></section><section id="result" class="card hidden"><h2>Kết quả</h2><div id="score"></div><div id="categoryScore"></div><div id="review"></div><button onclick="location.reload()">Về trang chính</button></section></main><footer>Static site - chạy trên GitLab Pages/GitHub Pages/Vercel</footer><script src="js/app.js"></script></body></html>
